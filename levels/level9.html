<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Level 9</title>
  <link rel="stylesheet" href="../css/level.css" />
</head>
<body>

<div id="level-card">
  <h2>Level 9</h2>
  <div id="timer">Time: 180</div>

  <div id="maze-wrapper">
    <div id="grid"></div>
    <div id="items"></div>
    <div id="wall-overlay"></div>
  </div>
</div>

<div class="controls">

  <button onclick="move('up')">⬆</button>

  <div class="middle">
    <button onclick="move('left')">⬅</button>
    <button class="center-btn">●</button>
    <button onclick="move('right')">➡</button>
  </div>

  <button onclick="move('down')">⬇</button>

</div>

<!-- MODAL -->
<div id="levelModal">
  <div class="modal-box">
    <h3>Level Completed!</h3>
    <button id="modalOk">OK</button>
  </div>
</div>

<script type="module" src="../js/level9.js"></script>
</body>
</html>
